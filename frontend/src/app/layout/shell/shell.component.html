<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__nav">
    <div class="shell__brand">
      <span class="shell__brand-title">API Doc</span>
      <span class="shell__brand-sub">Platform</span>
    </div>
    <mat-divider />
    <mat-nav-list>
      <a mat-list-item routerLink="/apis" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>list</mat-icon>
        <span matListItemTitle>API List</span>
      </a>
      <a mat-list-item routerLink="/builder" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>build</mat-icon>
        <span matListItemTitle>API Builder</span>
      </a>
      <a mat-list-item routerLink="/tester" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>play_arrow</mat-icon>
        <span matListItemTitle>API Tester</span>
      </a>
      <a mat-list-item routerLink="/logs" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>analytics</mat-icon>
        <span matListItemTitle>Logs</span>
      </a>
      <a mat-list-item routerLink="/pdf" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>picture_as_pdf</mat-icon>
        <span matListItemTitle>PDF Viewer</span>
      </a>
      <a mat-list-item routerLink="/guide" routerLinkActive="shell__link--active">
        <mat-icon matListItemIcon>menu_book</mat-icon>
        <span matListItemTitle>User guide</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar color="primary" class="shell__toolbar">
      <mat-icon class="shell__toolbar-icon" aria-hidden="true">hub</mat-icon>
      <div class="shell__toolbar-text">
        <span class="shell__toolbar-title">Dynamic API Documentation</span>
        <span class="shell__toolbar-sub">Build · test · document</span>
      </div>
    </mat-toolbar>
    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
